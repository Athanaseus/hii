<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HII Region Explorer</title>
        <link rel="icon" type="image/x-icon" href="img/logo.ico">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
        <link rel="stylesheet" href="style.css">

        <!-- Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://athanaseus.github.io/hii/">
        <meta property="og:title" content="HII Region Explorer">
        <meta property="og:description" content="Explore and search HII regions using SMGPS data.">
        <meta property="og:image" content="https://athanaseus.github.io/hii/img/header.png">
        
    </head>

    <body>
        <section id="header">
            <a href="https://athanaseus.github.io/hii"><img src="img/logo.ico" class="logo" alt=""></a>

            <div>
                <ul id="navbar">
                    <li><a class="active" href="index.html">MilkyWay</a></li>
                    <li><a href="catalogue.html">Catalogue</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <a href="#" id="close"><i class='bx bx-x'></i></a>
                </ul>
            </div>
            <div id="mobile">
                <i id="bar" class='bx bx-menu'></i>
            </div>
        </section>

        <section id="page-header">
            <h2></h2>
            <p></p>
        </section> 
        <section id="newsletter" class="section-p1 section-m1">
            <div class="newstext">
                <h4>SMGPS source identifier</h4>
                <p>Name of HII region to retrieve properties</p>
            </div>
            <div class="form">
                <input type="text" id="searchInput" placeholder="Enter Source Name (e.g. G005.191)" />
                <button class="normal" onclick="searchSources()">Search</button>
            </div>
        </section>

        <section id="product1" class="section-p1">
        <div id="productContainer" class="pro-container"></div>
        </section>

        <section id="pagination" class="section-p1">
        <button class="normal" id="prevPage">Previous</button>
        <span id="pageInfo"></span>
        <button class="normal" id="nextPage">Next</button>
        </section>

        <section id="newsletter" class="section-p1 section-m1">
            <div class="newstext">
                <h4>Data Access</h4>
                <p>
                    <span>Full machine readable catalog.</span>
                    <a href="https://athanaseus.github.io/hii/catalogue.csv" target="_blank" rel="noopener">Download CSV</a>
                </p>
            </div>
        </section>

        <!-- Modal for source info -->
        <div id="sourceModal" class="modal">
        <div id="popupContent" class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <table id="modalTable"></table>
        </div>
        </div>

        <footer class="section-p1">
            <div class="col">
                <div class="follow">
                    <h4>Follow us</h4>
                    <div class="icon">
                        <i class='bx bxl-facebook'></i>
                        <i class='bx bxl-twitter' ></i>
                        <i class='bx bxl-instagram' ></i>
                        <i class='bx bxl-pinterest-alt' ></i>
                        <i class='bx bxl-youtube' ></i>
                    </div>
                </div>
            </div>

            <div class="copyright">
                <p>© 2026, HII</p>
            </div>
        </footer>

        <script src="script.js"></script>
        <script>
        const perPage = 12;
        let currentPage = 1;
        let sources = [];
        let filtered = [];
        let catalog = [];
        const DIST_SUFFIX = '_dist.png';
        const distAvailabilityCache = new Map();

        async function fetchSources() {
            const res = await fetch('img/products/products.json');
            const files = await res.json();

            const distNames = new Set(
                files
                    .filter(file => file.endsWith(DIST_SUFFIX))
                    .map(file => file.split('_')[0])
            );

            sources = files
                .filter(file => !file.endsWith(DIST_SUFFIX))
                .map(file => {
                    const name = file.split('_')[0];
                    return {
                        file,
                        name,
                        hasDist: distNames.has(name)
                    };
                });

            filtered = [...sources];
            await fetchCatalog();
            renderPage();
        }

        async function fetchCatalog() {
            const res = await fetch('catalogue.csv');
            const text = await res.text();
            const [headerLine, ...rows] = text.trim().split('\n');
            const headers = headerLine.split(',');
            catalog = rows.map(row => {
                const values = row.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
                return obj;
            });
        }

        function getSourceData(name) {
            return catalog.find(row => row["iauName"]?.toUpperCase() === name.toUpperCase());
        }

        function openModal(name) {
            const data = getSourceData(name);
            const modal = document.getElementById("sourceModal");
            const title = document.getElementById("modalTitle");
            const table = document.getElementById("modalTable");

            if (!data) {
                title.textContent = name;
                table.innerHTML = "<tr><td>No data found in catalog.</td></tr>";
            } else {
                title.textContent = data["iauName"];
                table.innerHTML = Object.entries(data).map(([k, v]) =>
                    `<tr><td><strong>${k}</strong></td><td>${v}</td></tr>`
                ).join('');
            }

            modal.style.display = "block";
        }

        function closeModal() {
            document.getElementById("sourceModal").style.display = "none";
        }

        function canShowDistPlot(name) {
            if (distAvailabilityCache.has(name)) {
                return Promise.resolve(distAvailabilityCache.get(name));
            }

            const distPath = `img/products/${name}${DIST_SUFFIX}`;

            return new Promise(resolve => {
                const probe = new Image();

                probe.onload = () => {
                    distAvailabilityCache.set(name, true);
                    resolve(true);
                };

                probe.onerror = () => {
                    distAvailabilityCache.set(name, false);
                    resolve(false);
                };

                probe.src = distPath;
            });
        }

        function createImageSlider(name, imagePaths) {
            const slider = document.createElement("div");
            slider.className = "image-slider";

            const img = document.createElement("img");
            img.className = "shirt";
            img.alt = name;

            let currentIndex = 0;
            let ignoreClick = false;
            let touchStartX = 0;

            const updateImage = () => {
                img.src = imagePaths[currentIndex];
            };

            const goNext = () => {
                currentIndex = (currentIndex + 1) % imagePaths.length;
                updateImage();
            };

            const goPrev = () => {
                currentIndex = (currentIndex - 1 + imagePaths.length) % imagePaths.length;
                updateImage();
            };

            img.addEventListener("click", function(event) {
                if (ignoreClick) {
                    event.preventDefault();
                    event.stopPropagation();
                    ignoreClick = false;
                    return;
                }
                openModal(name);
            });

            slider.addEventListener("touchstart", function(event) {
                if (event.touches.length !== 1) return;
                touchStartX = event.touches[0].clientX;
            }, { passive: true });

            slider.addEventListener("touchend", function(event) {
                if (event.changedTouches.length !== 1) return;
                const touchEndX = event.changedTouches[0].clientX;
                const deltaX = touchEndX - touchStartX;

                if (Math.abs(deltaX) < 40 || imagePaths.length < 2) {
                    return;
                }

                if (deltaX < 0) {
                    goNext();
                } else {
                    goPrev();
                }

                ignoreClick = true;
            }, { passive: true });

            updateImage();
            slider.appendChild(img);

            if (imagePaths.length > 1) {
                const prevBtn = document.createElement("button");
                prevBtn.type = "button";
                prevBtn.className = "slider-arrow slider-arrow-left";
                prevBtn.setAttribute("aria-label", `Previous plot for ${name}`);
                prevBtn.innerHTML = "&#10094;";
                prevBtn.addEventListener("click", function(event) {
                    event.preventDefault();
                    event.stopPropagation();
                    goPrev();
                });

                const nextBtn = document.createElement("button");
                nextBtn.type = "button";
                nextBtn.className = "slider-arrow slider-arrow-right";
                nextBtn.setAttribute("aria-label", `Next plot for ${name}`);
                nextBtn.innerHTML = "&#10095;";
                nextBtn.addEventListener("click", function(event) {
                    event.preventDefault();
                    event.stopPropagation();
                    goNext();
                });

                slider.appendChild(prevBtn);
                slider.appendChild(nextBtn);
            }

            return slider;
        }

        async function renderPage() {
            const container = document.getElementById("productContainer");
            container.innerHTML = "";
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageItems = filtered.slice(start, end);

            for (const { file, name, hasDist } of pageItems) {
                const div = document.createElement("div");
                div.className = "pro";

                const imagePaths = [`img/products/${file}`];
                let showDist = Boolean(hasDist);

                if (!showDist) {
                    showDist = await canShowDistPlot(name);
                }

                if (showDist) {
                    imagePaths.push(`img/products/${name}${DIST_SUFFIX}`);
                }

                div.appendChild(createImageSlider(name, imagePaths));

                const details = document.createElement("div");
                details.className = "des";
                details.innerHTML = `
                    <span>HII region</span>
                    <h5>${name}</h5>

                    <p style="margin: 5px 0;">
                        <strong>Distance:</strong> 
                        ${getSourceData(name)?.["distance_kpc"] || "N/A"} 
                        &pm; ${getSourceData(name)?.["distance_err_kpc"] || "N/A"} kpc
                    </p>

                    <p style="margin: 5px 0;">
                        <strong>log(N<sub>Ly</sub>):</strong> 
                        ${getSourceData(name)?.["N_Ly"] || "N/A"} s<sup>-1</sup>
                    </p>

                    <p style="margin: 5px 0;">
                        <strong>Spectral Type:</strong> 
                        ${getSourceData(name)?.["Spectral Type"] || "N/A"}
                    </p>

                `;
                div.appendChild(details);

                container.appendChild(div);
            }

            document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${Math.ceil(filtered.length / perPage)}`;
        }

        function searchSources() {
            const input = document.getElementById("searchInput").value.trim().toUpperCase();
            filtered = input === "" ? [...sources] : sources.filter(s => s.name.startsWith(input));
            currentPage = 1;
            renderPage();
        }

        document.getElementById("prevPage").onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage();
            }
        };

        document.getElementById("nextPage").onclick = () => {
            if (currentPage < Math.ceil(filtered.length / perPage)) {
                currentPage++;
                renderPage();
            }
        };

        window.onload = fetchSources;

        document.addEventListener('click', function(event) {
        const popup = document.getElementById('popup');
        const popupContent = document.getElementById('popupContent');
        if (popup && popup.style.display === 'block' && !popupContent.contains(event.target)) {
            popup.style.display = 'none';
        }
        });

        </script>

    </body>
</html>
